<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/df5f86cab8.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
    <title>FinTrack: Finanças Pessoais</title>
</head>

<body>
    <header>
        <nav class="topbar">
            <div class="topbar-left">
                <a href="./index.html"><i class="fa-brands fa-btc"></i></i><span>FinTrack</span></a>
            </div>

            <ul class="topbar-center">
                <li><a href="./index.html" class="active" >ÍNICIO</a></li>
                <li><a href="./despesa.html">DESPESAS</a></li>
                <li><a href="./entrada.html">ENTRADAS</a></li>
                <li><a href="./grafico.html">GRÁFICOS</a></li>
                <li><a href="./fatura.html">FATURAS</a></li>
            </ul>

            <div class="topbar-right">
                <a href="./account.html" class="user"><i class="fa-solid fa-circle-user"></i>Entrar</a>
                <a href="#">Registrar</a>
                <div class="fa-solid fa-bars" id="menu-icon"></div>
            </div>
        </nav>
    </header>
    <main class="main-page">
        <div class="account-info">
            <div class="user-details">
                <p class="user-name">Nome do Usuário</p>
                <p class="account-balance">Saldo Atual: R$ 1.000,00</p>
            </div>

            <div class="fast-access">
                <button id="entrance-btn">ENTRADA</button>
                <button id="expense-btn">DESPESA</button>
            </div>
        </div>

        <div class="info-container">
            <div class="graphic-info"></div>
            <div class="last-transactions"></div>
        </div>

        <div id="modal-entrance" class="modal">
            <div class="modal-content">
                <span class="btnExitModal">&times;</span>
                <h2>Nova Entrada</h2>
                <input type="text" placeholder="Descrição da entrada">
                <input type="number" placeholder="Valor (R$)">
                <button>Salvar</button>
            </div>
        </div>

        <div id="modal-expense" class="modal">
            <div class="modal-content">
                <span class="btnExitModal">&times;</span>
                <h2>Nova Despesa</h2>
                <input type="text" placeholder="Descrição da despesa">
                <input type="number" placeholder="Valor (R$)">
                <button>Salvar</button>
            </div>
        </div>
    </main>
    <footer>
        <div id="footer_content">

            <div id="footer_social_media">
                <a href="#" class="footer-link" id="github">
                    <i class="fa-brands fa-github"></i>
                </a>
                <a href="#" class="footer-link" id="instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="#" class="footer-link" id="linkedin">
                    <i class="fa-brands fa-linkedin"></i>
                </a>
            </div>
        </div>
    </footer>
    <script src="./scripts.js"></script>
    <script src="./index.js"></script>
</body>

</html>
